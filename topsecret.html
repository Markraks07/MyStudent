<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" href="journal-bookmark.svg">
    <title>Top Secret · MyStudent</title>
</head>

<body>

    <button class="menu-toggle">☰</button>

    <aside>
        <header>
            <h1><a href="index.html">MyStudent</a></h1>
        </header>
        <nav>
            <ul>
                <li class="boton-menu"><a href="deberes.html">Deberes</a></li>
                <li class="boton-menu"><a href="calcular-media.html">Calcular Media</a></li>
                <li class="boton-menu"><a href="notas.html">Mis Notas</a></li>
                <li class="boton-menu active"><a href="topsecret.html">Top Secret</a></li>
                <li class="boton-menu"><a href="extras.html">Extras</a></li>
        </nav>
        <footer>
            <p class="text-footer">© MyStudents Coder</p>
        </footer>
    </aside>

    <main>
        <header class="d-flex justify-content-between align-items-center mb-4">
            <h2 id="greeting" class="m-0">¡Hola!</h2>
            <button id="dark-toggle" aria-label="Modo oscuro">🌙</button>
        </header>

        <div class="container-fluid text-center">

            <!-- 🔐 CAJA LOGIN -->
            <div id="login-box" class="card shadow-lg p-4 mx-auto mb-5" style="max-width:400px;">
                <h3 class="mb-4">🔐 Acceso restringido</h3>
                <input type="password" id="password-input" class="form-control mb-3" placeholder="Contraseña">
                <button onclick="login()" class="btn btn-primary w-100">Entrar</button>
            </div>

            <!-- 🔥 CAJA SECRETA (OCULTA AL INICIO) -->
            <div id="secret-box" style="display:none;">

                <!-- GENERADOR DE EXCUSAS -->
                <h1 class="display-4 my-5">🤫 Excusas creíbles para profes del Can Planas</h1>
                <div class="card shadow-lg mx-auto mb-5" style="max-width: 800px;">
                    <div class="card-body p-5">
                        <p id="excusa" class="display-5 fw-bold mb-4" style="min-height: 130px;">Pulsa el botón...</p>
                        <button id="nueva-excusa" class="btn btn-danger btn-lg px-5">¡Sálvame ya!</button>
                    </div>
                </div>

                <hr class="my-5">

                <!-- BUSCADOR DE RECURSOS -->
                <h1 class="display-5 mb-5">🔥 Recursos GRATIS para 2º ESO (2025 actualizado)</h1>

                <div class="row g-3 justify-content-center mb-4">
                    <div class="col-lg-8">
                        <input type="text" id="buscador-recursos" class="form-control form-control-lg text-center"
                            placeholder="Busca por asignatura o tema... (mates, lengua, física, exámenes...)">
                    </div>
                </div>

                <div id="resultados-recursos" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
                    
                </div>
                <button onclick="logout()" class="btn btn-outline-danger mt-5">Cerrar sesión</button>

            </div>
        </div>
    </main>

    <script src="main.js"></script>
</body>

</html>
