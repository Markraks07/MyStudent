<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="icon" href="journal-bookmark.svg" class="icon-page">
    <title>Deberes · MyStudent</title>
</head>

<body>
    <button class="menu-toggle">☰</button>
    <aside>
        <header>
            <h1><a href="index.html">MyStudent</a></h1>
        </header>
        <nav>
            <ul>
                <li class="boton-menu"><a href="deberes.html">Deberes</a></li>
                <li class="boton-menu"><a href="calcular-media.html">Calcular Media</a></li>
                <li class="boton-menu"><a href="notas.html">Mis Notas</a></li>
                <li class="boton-menu"><a href="topsecret.html">Top Secret</a></li>
                <li class="boton-menu"><a href="extras.html">Extras</a></li>
            </ul>
        </nav>

        <footer>
            <p class="text-footer">© MyStudents Coder</p>
        </footer>
    </aside>
    <main>
        <header>
            <h2 id="greeting" class="m-0">¡Hola, estudiante!</h2>
            <button id="dark-toggle" aria-label="Modo oscuro">🌙</button>
        </header>
        <div class="container-fluid">

            <h1 class="mb-4">Deberes, Trabajos y Exámenes</h1>

            <!-- Formulario para añadir nueva tarea -->
            <div class="card mb-4">
                <div class="card-body">
                    <form id="form-tarea" class="row g-3">
                        <div class="col-md-5">
                            <input type="text" class="form-control" id="nombre-tarea"
                                placeholder="Nombre del deber / examen / trabajo" required>
                        </div>
                        <div class="col-md-3">
                            <input type="date" class="form-control" id="fecha-tarea" required>
                        </div>
                        <div class="col-md-2">
                            <select class="form-select" id="tipo-tarea">
                                <option value="Deber">Deberes</option>
                                <option value="Trabajo">Trabajo</option>
                                <option value="Examen">Examen</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <button type="submit" class="btn btn-primary w-100">+ Añadir</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Tabla de tareas -->
            <div class="card">
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle" id="tabla-tareas">
                            <thead class="table-light">
                                <tr>
                                    <th>Tarea</th>
                                    <th>Tipo</th>
                                    <th>Fecha</th>
                                    <th>Días restantes</th>
                                    <th>Estado</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Las filas se generan con JavaScript -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            <!-- POMODORO -->
            <div class="card shadow-lg mb-5">
                <div class="card-body text-center p-5">
                    <div id="timer" class="display-1 fw-bold mb-4">25:00</div>
                    <div class="d-flex justify-content-center gap-3 mb-4">
                        <button id="start" class="btn btn-success btn-lg px-5">▶️ Empezar</button>
                        <button id="pause" class="btn btn-warning btn-lg px-5" disabled>⏸ Pausar</button>
                        <button id="reset" class="btn btn-danger btn-lg px-5">🔄 Reiniciar</button>
                    </div>
                    <div class="fs-4">
                        Sesión: <span id="sesion-num">1</span> |
                        Pomodoros hechos: <span id="pomodoros-hechos">0</span>
                    </div>
                </div>
            </div>

        </div>
    </main>
</body>
<script src="main.js"></script>

</html>
