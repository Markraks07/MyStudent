<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="icon" href="journal-bookmark.svg">
  <title>Extras · MyStudent</title>

</head>

<body>

  <!-- Botón menú responsive -->
  <button class="menu-toggle">☰</button>

  <!-- ASIDE LATERAL -->
  <aside>
    <header>
      <h1><a href="index.html">MyStudent</a></h1>
    </header>
    <nav>
      <ul>
        <li class="boton-menu"><a href="deberes.html">Deberes</a></li>
        <li class="boton-menu"><a href="calcular-media.html">Calcular Media</a></li>
        <li class="boton-menu"><a href="notas.html">Mis Notas</a></li>
        <li class="boton-menu"><a href="topsecret.html">Top Secret</a></li>
        <li class="boton-menu active"><a href="extras.html">Extras 🔥</a></li>
      </ul>
    </nav>
    <footer>
      <p class="text-footer">© MyStudents Coder</p>
    </footer>
  </aside>

  <!-- MAIN -->
  <main id="extras-main" class="container-fluid py-4">

    <header class="d-flex justify-content-between align-items-center mb-4">
      <h2 class="m-0">⚡ Extras del Can Planas</h2>
      <button id="dark-toggle" aria-label="Modo oscuro">🌙</button>
    </header>

    <!-- FRASE DEL DÍA + VACACIONES -->
    <div class="card shadow mb-4">
      <div class="card-body text-center">
        <p class="motivacion display-6" id="frase-dia"></p>
        <p class="countdown display-4" id="vacaciones"></p>
      </div>
    </div>

    <!-- CALENDARIO DE EXÁMENES -->
    <div class="card shadow mb-4">
      <div class="card-body">
        <h3>📅 Próximos exámenes</h3>
        <div class="input-group mb-3">
          <input type="text" id="exam-nombre" class="form-control" placeholder="Ej: Mates tema 5">
          <input type="date" id="exam-fecha" class="form-control">
          <button id="add-exam" class="btn btn-primary">+ Añadir</button>
        </div>
        <div id="lista-examenes"></div>
      </div>
    </div>

    <!-- STICKY NOTES -->
    <div class="card shadow mb-4">
      <div class="card-body">
        <h3>📌 Notas rápidas</h3>
        <textarea id="nueva-nota" class="form-control mb-3" rows="3" placeholder="Escribe aquí..."></textarea>
        <button id="add-nota" class="btn btn-warning">+ Pegar nota</button>
        <div id="stickies" class="mt-4"></div>
      </div>
    </div>

    <!-- LO-FI PARA ESTUDIAR -->
    <div class="card shadow mb-4">
      <div class="card-body text-center">
        <h3>🎧 Lo-fi para estudiar</h3>
        <audio id="lofi" loop>
          <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
        </audio>
        <button id="play-lofi" class="btn btn-outline-primary btn-lg me-3">▶️ Play</button>
        <button id="stop-lofi" class="btn btn-outline-danger btn-lg">⏹ Stop</button>
      </div>
    </div>

    <!-- RANKING -->
    <div class="card shadow mb-4">
      <div class="card-body text-center">
        <h3>🏆 Tu ranking</h3>
        <p class="display-6">Pomodoros: <span id="rank-pomos" class="text-success">0</span></p>
        <p class="display-6">Tareas hechas: <span id="rank-tareas" class="text-primary">0</span></p>
        <div id="medalla" class="fs-1 mt-3"></div>
      </div>
    </div>

    <!-- MODO EXAMEN + FIESTA -->
    <div class="text-center py-4">
      <button id="modo-examen" class="btn btn-dark btn-lg px-5 me-4">🧠 Modo Examen</button>
      <button id="fiesta" class="btn btn-warning btn-lg px-5">🎉 ¡Aprobé todo!</button>
    </div>
  </main>

  <!-- CONFETI -->
  <canvas id="confeti"></canvas>

  <script src="main.js"></script>
  <script>
    // Menú responsive toggle
    const menuToggle = document.querySelector('.menu-toggle');
    const aside = document.querySelector('aside');
    menuToggle.addEventListener('click', () => {
      aside.classList.toggle('show');
    });
  </script>
</body>


</html>
