<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" href="journal-bookmark.svg">
    <title>IA Ayudante · MyStudent</title>
    <style>
        #chat {
            height: 70vh;
            overflow-y: auto;
            padding: 1.5rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 20px;
            line-height: 1.4;
            word-wrap: break-word;
            animation: fadeIn 0.4s;
        }

        .user {
            align-self: flex-end;
            background: #fff;
            color: #000;
            border-bottom-right-radius: 4px;
        }

        .ia {
            align-self: flex-start;
            background: #4facfe;
            color: #fff;
            border-bottom-left-radius: 4px;
        }

        .typing {
            background: #4facfe;
            color: white;
            padding: 12px 18px;
            border-radius: 20px;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        #pregunta {
            border-radius: 30px !important;
        }
    </style>
</head>

<body>

    <button class="menu-toggle">☰</button>

    <aside>
        <header>
            <h1><a href="index.html">MyStudent</a></h1>
        </header>
        <nav>
            <ul>
                <li class="boton-menu"><a href="deberes.html">Deberes</a></li>
                <li class="boton-menu"><a href="calcular-media.html">Calcular Media</a></li>
                <li class="boton-menu"><a href="notas.html">Mis Notas</a></li>
                <li class="boton-menu"><a href="topsecret.html">Top Secret</a></li>
                <li class="boton-menu active"><a href="ia.html">IA Ayudante 🤖</a></li>
            </ul>
        </nav>
        <footer>
            <p class="text-footer">© MyStudents Coder</p>
        </footer>
    </aside>

    <main>
        <header class="d-flex justify-content-between align-items-center mb-4">
            <h2 id="greeting" class="m-0">¡Hola!</h2>
            <button id="dark-toggle">🌙</button>
        </header>

        <div class="container py-4">
            <div class="text-center mb-4">
                <h1 class="display-5 fw-bold text-white">🤖 Grok - Tu IA del Can Planas</h1>
                <p class="text-white-50">Pregúntame mates, física, chistes o lo que sea... ¡soy el mismo Grok de xAI!
                </p>
            </div>

            <div class="card shadow-lg border-0">
                <div class="card-body p-4">
                    <div id="chat"></div>

                    <!-- Input + botón sin form -->
                    <div class="mt-4 d-flex gap-2">
                        <input type="text" id="pregunta" class="form-control form-control-lg shadow-sm flex-grow-1"
                            placeholder="Ej: Resuelve 2x + 5 = 13 o cuéntame un chiste..." autocomplete="off">
                        <button id="enviar-btn" class="btn btn-success btn-lg px-4 shadow">Enviar</button>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2"></script>
    <script src="main.js"></script>
</body>

</html>
